syntax = "proto3";

package user.v1;

option go_package = "github.com/your-org/go-base/internal/infrastructure/grpc/generated/user;grpcUser";

service UserService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  string id = 1;
  string email = 2;
  string full_name = 3;
  int32 role = 4;
  string status = 5;
}